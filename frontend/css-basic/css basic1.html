<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>CSS Basics Project</h1>
    </header>

    <!-- MAIN -->
    <main>

        <!-- BOX MODEL -->
        <section>
            <h2>Box Model</h2>
            <div class="box">
                Ini contoh Box Model
            </div>
        </section>

        <!-- FLEXBOX -->
        <section>
            <h2>Flexbox Layout</h2>
            <div class="flex-container">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
            </div>
        </section>

        <!-- FORM -->
        <section>
            <h2>Styled Form</h2>
            <form>
                <label>Nama:</label>
                <input type="text">

                <label>Email:</label>
                <input type="email">

                <button type="submit">Kirim</button>
            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 CSS Basics</p>
    </footer>

</body>
</html>
